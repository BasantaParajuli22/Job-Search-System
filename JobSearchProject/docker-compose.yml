version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8081:8080"  # Host:Container port mapping
    depends_on:
      - db           # Ensures db starts before backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jobportal
      SPRING_DATASOURCE_USERNAME: jobportal
      SPRING_DATASOURCE_PASSWORD: jobportal
    command: ["/app/wait-for-it.sh", "db:5432", "--", "java", "-jar", "/app/app.jar"]
    networks:
      - jobportal-network

  db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: jobportal
      POSTGRES_USER: jobportal
      POSTGRES_PASSWORD: jobportal
    ports:
      - "5432:5432"  # Expose DB to host on port 5435
    networks:
      - jobportal-network

networks:
  jobportal-network:  # Correcting the network name to match
    driver: bridge
