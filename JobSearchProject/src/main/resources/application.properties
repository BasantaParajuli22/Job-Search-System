spring.application.name=JobSearchProject

#spring.datasource.url=jdbc:postgresql://localhost:5432/jobsearch
#spring.datasource.username=jobsearch
#spring.datasource.password=jobsearch

# For Docker, use the environment variables for database connection
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#spring.datasource.driver-class-name=org.postgresql.Driver 

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.main.allow-bean-definition-overriding=true


# Ensure your data.sql is also correctly referenced and run at startup
spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:schema.sql
#spring.sql.init.data-locations=classpath:data.sql

logging.level.root=INFO

# Server Configuration
server.port=8080
