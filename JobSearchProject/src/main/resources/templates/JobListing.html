<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Vacancy</title>
    <link rel="stylesheet" th:href="@{/css/jobListing.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
	<!-- Navigation Bar -->
	    <nav>
	        <ul>
	            <li><a th:href="@{/}">Home</a></li>
				<li><a th:href="@{/view/jobposts}">All Jobs</a></li>
				<li><a th:href="@{/view/dashboard}">Dashboard</a></li>
	            <li><a th:href="@{/jobseeker/register}">Register as Job Seeker</a></li>
	            <li><a th:href="@{/employer/register}">Register as Employer</a></li> 
				<!-- Profile link based on user role -->
				   <li sec:authorize="hasRole('JOBSEEKER')">
				       <a th:href="@{/jobseekers/profile}">JProfile</a>
				   </li>
				   <li sec:authorize="hasRole('EMPLOYER')">
				       <a th:href="@{/employers/profile}">EProfile</a>
				   </li>
				   <li sec:authorize="hasRole('ADMIN')">
				       <a th:href="@{/admin/profile}">Admin Profile</a>
				   </li>        
			   <li><a th:href="@{/login}">Login</a></li>
			   </ul>
			   
	    </nav>
		
    <div class="job-container">
        <div class="job-header">
            <h1 th:text="${jobPost.title}">Vacancy for the Waiter</h1>
            <span class="urgent-badge">Urgent</span>
            <span class="deadline" th:text="'Application deadline: ' + ${jobPost.applicationDeadline}"></span>
        </div>

        <div class="location-info">
            <i class="fas fa-map-marker-alt icon"></i> 
            <span th:text="${jobPost.cityLocation}"></span> | 
            <span>Salary: <span th:text="${jobPost.salaryRange}"></span></span>
        </div>

        <div class="job-info-section">
            <h3>Job Description</h3>
            <p th:text="${jobPost.jobDescription}"></p>
        </div>
		
		<div class="job-info-section">
		     <h3>jobType</h3>
		     <p th:text="${jobPost.jobType}"></p>
		</div>
		<!-- Background, Skills & Experience -->
		<div class="job-info-section">
		    <h3>Background, Skills & Experience</h3>
		    <p th:each="skill : ${jobPost.skills}">
		        <span th:text="${skill}">Skill details</span><br>
		    </p>
		    <p th:text="'Experience Level: ' + ${jobPost.experienceLevel}"></p>
		</div>

		<!-- Remote/Onsite Section -->
		<div class="job-info-section">
		    <h3>Work Type</h3>
		    <p th:text="${jobPost.isRemote ? 'Remote' : 'Onsite'}"></p>
		</div>

		<!-- Contact Info -->
		<div class="job-info-section">
		    <h3>Contact Information</h3>
		    <p>Email: <span th:text="${jobPost.contactEmail}"></span></p>
		</div>

		<!-- Stats Section -->
		<div class="stats">
		    <i class="fas fa-clock icon"></i> 
		    <span th:text="'Posted on: ' + ${jobPost.createdAt}"></span> |
		    <i class="fas fa-sync-alt icon"></i>
		    <span th:text="'Updated on: ' + ${jobPost.updatedAt}"></span>
		</div>
		
		<!-- only display if jobSeeker object is not null-->
		<td>
			<form th:if="${jobSeeker != null}"
			th:action="@{/applications/applyBy/{jobSeekerId}/to/{jobId}/{companyName}(jobSeekerId=${jobSeeker.jobSeekerId},jobId=${jobPost.jobId},companyName=${jobPost.employer.companyName})}" method="post">
			    <!-- Uncomment if CSRF protection is needed -->
			    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
			    <button type="submit">Apply</button>
			</form>
		</td>
<!-- 
        <div class="related-jobs">
            <h3>Related Jobs</h3>
            <div class="related-job-item" th:each="relatedJob : ${relatedJobs}">
                <a th:href="@{/job/{id}(id=${relatedJob.id})}">
                    <span th:text="${relatedJob.company}"></span> - <span th:text="${relatedJob.jobType}"></span> <br>
                    <span>Qualification: <span th:text="${relatedJob.qualification}">SLC (10th)</span></span>
                </a>
                <span class="status" th:text="${relatedJob.status}">No more accepting applications</span>
            </div>
        </div>
-->
    </div>

</body>
</html>
