<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create/Edit Job Posting</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Header to determine if it's an edit or create form -->
    <h1 th:text="${jobPosting.jobId != null} ? 'Edit Job Posting' : 'Create Job Posting'"></h1>

	<!-- Form Action URL - new or update based on jobId -->
	<!-- Dynamic URL Construction (String Concatenation)-->
	<!-- Works well for more complex URL logic and multiple conditions like in a ternary operator (? :)-->
	<form th:action="@{${jobPosting.jobId != null} ? 
	    '/jobposts/' + ${jobPosting.jobId} + '/edit/by/' + ${jobPosting.employer.companyName} : 
	    '/jobposts/new/create'}" 
	    method="post" th:object="${jobPosting}">
    
        <!-- Hidden field for employerId (assuming employer is provided in the model) -->
        <input type="hidden" th:value="${employer.employerId}" name="employerId">

        <!-- Job Title -->
        <div>
            <label for="title">Job Title:</label>
            <input type="text" id="title" name="title" th:field="*{title}" >
        </div>

        <!-- Job Description -->
        <div>
            <label for="jobDescription">Job Description:</label>
            <textarea id="jobDescription" name="jobDescription" rows="4" th:field="*{jobDescription}" ></textarea>
        </div>

        <!-- Job Requirements -->
        <div>
            <label for="requirements">Requirements:</label>
            <textarea id="requirements" name="requirements" rows="4" th:field="*{requirements}" ></textarea>
        </div>

        <!-- Job Location -->
        <div>
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" th:field="*{location}" >
        </div>

        <!-- Job Type (e.g., Full-time, Part-time, Contract) -->
        <div>
            <label for="jobType">Job Type:</label>
            <select id="jobType" name="jobType" th:field="*{jobType}">
                <option value="Full-Time">Full-Time</option>
                <option value="Part-Time">Part-Time</option>
                <option value="Contract">Contract</option>
            </select>
        </div>

        <!-- Salary Range -->
        <div>
            <label for="salaryRange">Salary Range:</label>
            <input type="text" id="salaryRange" name="salaryRange" th:field="*{salaryRange}">
        </div>


        <!-- Job Status (e.g., Active, Closed, On Hold) -->
        <div>
            <label for="status">Status:</label>
            <select id="status" name="status" th:field="*{status}">
                <option value="active">Active</option>
                <option value="closed">Closed</option>
                <option value="on hold">On Hold</option>
            </select>
        </div>

        <!-- Application Deadline -->
        <div>
            <label for="applicationDeadline">Application Deadline:</label>
            <input type="date" id="applicationDeadline" name="applicationDeadline" th:field="*{applicationDeadline}">
        </div>

        <!-- Skills (comma-separated) -->
        <div>
            <label for="skills">Skills (comma-separated):</label>
            <input type="text" id="skills" name="skills" th:field="*{skills}" placeholder="e.g., Java, SQL, Communication">
        </div>

        <!-- Experience Level -->
        <div>
            <label for="experienceLevel">Experience Level:</label>
            <select id="experienceLevel" name="experienceLevel" th:field="*{experienceLevel}">
                <option value="Entry">Entry</option>
                <option value="Mid">Mid</option>
                <option value="Senior">Senior</option>
            </select>
        </div>
		
		<!-- Job Category as foreign key -->
		<div>
		     <label for="category">Job Category:</label>
		     <select id="category" th:field="*{jobCategory.categoryId}">
		     <option th:each="category : ${categories}" th:value="${category.categoryId}" 
			 th:text="${category.categoryName}"></option>
		     </select><br/>
		</div>
		
		-->
		<!-- Remote Job cannot set this nullable -->
		<div>
		    <label for="isRemote">Is this job remote?</label>
		    <input type="checkbox" id="isRemote" name="remote" th:field="*{remote}"> <!-- Use 'remote' here -->
		</div>
		
        <!-- Start Date -->
        <div>
            <label for="startDate">Start Date:</label>
            <input type="date" id="startDate" name="startDate" th:field="*{startDate}">
        </div>

        <!-- End Date (optional) -->
        <div>
            <label for="endDate">End Date:</label>
            <input type="date" id="endDate" name="endDate" th:field="*{endDate}">
        </div>

        <!-- Contact Email -->
        <div>
            <label for="contactEmail">Contact Email:</label>
            <input type="email" id="contactEmail" name="contactEmail" th:field="*{contactEmail}">
        </div>

        <!-- Submit and Cancel Buttons -->
        <div>
            <button type="submit">Save</button>
            <a href="/view/jobposts">Cancel</a>
        </div>
    </form>
</body>
</html>
