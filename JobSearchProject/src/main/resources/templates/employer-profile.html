<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
   
	<!-- Navigation Bar -->
	<header th:replace="~{fragments/nav :: nav}"></header>

		<div class="mainContainer">
		    <h1>Welcome, Employer!</h1>
			
			<p>User ID: <span th:text="${employer.users.userId}"></span></p>
		    <p>Company Name: <span th:text="${employer.companyName}"></span></p>
		    <p>Email: <span th:text="${employer.companyDescription}"></span></p>
			<p>Email: <span th:text="${employer.contactNumber}"></span></p>
			<p>Email: <span th:text="${employer.address}"></span></p>
			<p>Email: <span th:text="${employer.email}"></span></p>
			<p>Email: <span th:text="${employer.website}"></span></p>
			<p>Email: <span th:text="${employer.createdAt}"></span></p>

			
		    
		    <!-- Render list of job postings by the employer 
		    <h3>Your Job Postings</h3>
		    <ul>
		        <li th:each="job : ${employer.postedJobs}">
		            <span th:text="${job.title}"></span> at <span th:text="${job.company}"></span>
		        </li>
		    </ul>
			-->
</body>
</html>
