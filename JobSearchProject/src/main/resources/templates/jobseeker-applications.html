<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Job Applications</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<!-- Navigation Bar -->
	<header th:replace="fragments/nav :: nav"></header>

    <h1>My Job Applications</h1>

    <div th:if="${allJobApplicants.isEmpty()}">
        <p>You have not applied to any jobs yet.</p>
    </div>

    <div th:unless="${allJobApplicants.isEmpty()}">
        <table>
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Status</th>
                    <th>Applied At</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="jobApplication : ${allJobApplicants}">
                    <td th:text="${jobApplication.jobPosting.title}">Job Title</td>
                    <td th:text="${jobApplication.applicationStatus}">Status</td>
                    <td th:text="${#dates.format(jobApplication.appliedAt, 'dd-MM-yyyy HH:mm')}">Applied Date</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
