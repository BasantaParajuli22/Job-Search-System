<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>
    <div class="mainContainer">
        <nav>
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/jobseekers/profile}">My Profile</a></li>
                <li><a th:href="@{/jobs}">Jobs</a></li>
                <li><a th:href="@{/logout}">Logout</a></li>
            </ul>
        </nav>

        <div class="profileInfo">
            <h3>User Information</h3>
            <div class="info">
                <label>Name:</label>
                <span th:text="${user.name}"></span>
            </div>
            <div class="info">
                <label>Email:</label>
                <span th:text="${user.email}"></span>
            </div>
            <div class="info" th:if="${userType == 'EMPLOYER'}">
                <label>Company Name:</label>
                <span th:text="${employer.companyName}"></span>
            </div>
            <div class="info" th:if="${userType == 'JOB_SEEKER'}">
                <label>Resume:</label>
                <span th:text="${jobSeeker.resume}"></span>
            </div>
            <div class="info" th:if="${userType == 'EMPLOYER'}">
                <label>Website:</label>
                <span th:text="${employer.website}"></span>
            </div>
            <div class="info">
                <label>Contact Number:</label>
                <span th:text="${user.contactNumber}"></span>
            </div>
            <div class="info">
                <label>Address:</label>
                <span th:text="${user.address}"></span>
            </div>
        </div>

        <div class="editProfile">
            <h3>Edit Profile</h3>
            <form th:action="@{/users/update}" method="post" th:object="${user}">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                <div class="form-group" th:if="${userType == 'EMPLOYER'}">
                    <label for="companyName">Company Name:</label>
                    <input type="text" id="companyName" th:field="*{companyName}">
                </div>
                <div class="form-group" th:if="${userType == 'JOB_SEEKER'}">
                    <label for="resume">Resume:</label>
                    <input type="text" id="resume" th:field="*{resume}">
                </div>
                <div class="form-group">
                    <label for="contactNumber">Contact Number:</label>
                    <input type="text" id="contactNumber" th:field="*{contactNumber}" required>
                </div>
                <div class="form-group">
                    <label for="address">Address:</label>
                    <input type="text" id="address" th:field="*{address}" required>
                </div>
                <div class="form-group">
                    <button type="submit">Update Profile</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
