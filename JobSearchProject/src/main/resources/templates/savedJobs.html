<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Saved Job Posts</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<!-- Navigation Bar -->
	<header th:replace="~{fragments/nav :: nav}"></header>

    <h1>My Saved Job Posts</h1>
    
    <!-- Check if there are saved job posts -->
    <div th:if="${#lists.isEmpty(myJobPosts)}">
        <p>No saved job posts found.</p>
    </div>

    <!-- Display saved job posts in a table -->
    <div th:if="${!#lists.isEmpty(savedPosts)}">
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Company</th>
                    <th>Location</th>
                    <th>Type</th>
                    <th>Application Deadline</th>
                </tr>
            </thead>
            <tbody>
                <!-- Loop through each saved job post and display its details -->
                <tr th:each="savedPost : ${savedPosts}">
                    <td th:text="${savedPost.jobPosting.title}">Job Title</td>
                    <td th:text="${savedPost.jobPosting.employer.companyName}">Company Name</td>
                    <td th:text="${savedPost.jobPosting.cityLocation}">Location</td>
                    <td th:text="${savedPost.jobPosting.jobType}">Job Type</td>
					<!-- use thymeleaf date format-->
					<td th:if="${savedPost.jobPosting.applicationDeadline != null}" 
					    th:text="${#temporals.format(savedPost.jobPosting.applicationDeadline, 'yyyy-MM-dd')}"></td>
					<td th:if="${savedPost.jobPosting.applicationDeadline == null}">No deadline</td>
				</tr>
            </tbody>
        </table>
    </div>

    <!-- Optional: A button to return to the main job posts view -->
    <div>
        <a href="/view/jobposts">Back to All Job Posts</a>
    </div>

</body>
</html>
