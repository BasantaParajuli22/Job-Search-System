spring.application.name=JobSearchProject

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.datasource.url=jdbc:postgresql://localhost:5432/jobsearch
spring.datasource.username=jobsearch
spring.datasource.password=jobsearch
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


logging.level.root=INFO
logging.level.com.example.springTrain=DEBUG
logging.file.name=logs/spring-boot-application.log
